name: Test Session Manager

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check session_manager.py --exit-zero

    - name: Verify Python compilation
      run: python -m py_compile session_manager.py

    - name: Set up templates
      run: |
        mkdir -p /tmp/templates
        cp index.html /tmp/templates/
        cp waiting.html /tmp/templates/

    - name: Start session manager
      run: |
        python session_manager.py &
        sleep 3

    - name: Test health endpoint
      run: |
        response=$(curl -sf http://localhost:8080/health)
        echo "Health response: $response"
        [ "$response" = "OK" ] || exit 1

    - name: Test main page
      run: |
        curl -sf http://localhost:8080/ | grep -q "KotorScript Session Manager" || exit 1

    - name: Test capacity endpoint
      run: |
        response=$(curl -sf http://localhost:8080/capacity)
        echo "Capacity response: $response"
        echo "$response" | python -c "import sys, json; d = json.load(sys.stdin); assert d['available'] == True"
