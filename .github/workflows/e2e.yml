name: E2E

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up templates
        run: |
          mkdir -p /tmp/templates
          cp index.html /tmp/templates/
          cp waiting.html /tmp/templates/

      - name: Start session manager
        run: |
          python session_manager.py &
          sleep 3

      - name: E2E - Health check
        run: |
          response=$(curl -sf http://localhost:8080/health)
          [ "$response" = "OK" ] || { echo "Health check failed: $response"; exit 1; }
          echo "Health check passed"

      - name: E2E - Landing page renders
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/)
          [ "$status" = "200" ] || { echo "Landing page returned $status"; exit 1; }
          curl -sf http://localhost:8080/ | grep -q "Start New Session" || { echo "Landing page content missing"; exit 1; }
          echo "Landing page OK"

      - name: E2E - Capacity API
        run: |
          response=$(curl -sf http://localhost:8080/capacity)
          echo "$response" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'current' in d, 'Missing current field'
          assert 'max' in d, 'Missing max field'
          assert 'available' in d, 'Missing available field'
          print('Capacity API OK:', d)
          "

      - name: E2E - Nonexistent session proxy returns error
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/s/nonexistent/test)
          echo "Proxy to nonexistent session returned: $status"
          # Should get a 502 or 5xx since the container doesn't exist
          [ "$status" -ge 400 ] || { echo "Expected error status for nonexistent session"; exit 1; }
          echo "Nonexistent session proxy test passed"
