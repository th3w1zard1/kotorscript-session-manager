# GitHub Pages Configuration
# KOTORScript Session Manager

# Repository information (auto-populated in CI)
repository:
  owner: "{{REPO_OWNER}}"
  name: "{{REPO_NAME}}"
  url: "https://github.com/{{REPO_OWNER}}/{{REPO_NAME}}"

# GitHub Pages settings
pages:
  source: "gh-pages"
  branch: "gh-pages"
  domain: "{{REPO_OWNER}}.github.io"
  path: "/{{REPO_NAME}}"

# Build settings
build:
  source: "."
  output: "gh-pages"
  files:
    - "index.html"
    - "waiting.html"
    - "README.md"
